<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document Viewer</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0b0b0f;
      --surface: #13131a;
      --border: #2a2a3a;
      --accent: #f5a623;
      --text: #e8e6f0;
      --muted: #7a7890;
      --highlight: #fff8ee;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .panel {
      width: min(760px, 100%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
    }
    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(28px, 4.2vw, 40px);
      color: var(--highlight);
      margin-bottom: 10px;
      line-height: 1.1;
    }
    .meta {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 20px;
      word-break: break-all;
    }
    .note {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 20px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 12px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid rgba(245,166,35,0.28);
      background: rgba(245,166,35,0.08);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: transform 0.2s, border-color 0.2s, color 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
      color: var(--accent);
    }
    .back {
      display: inline-block;
      margin-top: 4px;
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
    }
    .back:hover { color: var(--accent); }
  </style>
</head>
<body>
  <main class="panel">
    <div class="eyebrow">// document</div>
    <h1 id="docTitle">Project Document</h1>
    <p class="meta" id="docPath">--</p>
    <p class="note">Open the file in a new tab for viewing. Use <strong>Download Now</strong> if you want a local copy.</p>

    <div class="actions">
      <a id="openBtn" class="btn" href="#" target="_blank" rel="noopener">Open Document ↗</a>
      <a id="downloadBtn" class="btn" href="#" download>Download Now ⬇</a>
    </div>

    <a class="back" href="javascript:history.back()">← Back</a>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const file = params.get("file");
    const label = params.get("label") || "Project Document";

    const safeFile = file ? file.trim() : "";
    const titleEl = document.getElementById("docTitle");
    const pathEl = document.getElementById("docPath");
    const openBtn = document.getElementById("openBtn");
    const downloadBtn = document.getElementById("downloadBtn");

    titleEl.textContent = label;
    pathEl.textContent = safeFile || "No file selected";

    if (safeFile) {
      openBtn.href = safeFile;
      downloadBtn.href = safeFile;
    } else {
      openBtn.removeAttribute("href");
      downloadBtn.removeAttribute("href");
      openBtn.style.pointerEvents = "none";
      downloadBtn.style.pointerEvents = "none";
      openBtn.style.opacity = "0.5";
      downloadBtn.style.opacity = "0.5";
    }
  </script>
</body>
</html>
